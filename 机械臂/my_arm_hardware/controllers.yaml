controller_manager:
  ros__parameters:
    update_rate: 100  # 核心控制频率 100Hz

    # 1. 关节状态广播器：负责把底层读上来的电机位置，发给 RViz 界面显示
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 2. 机械臂轨迹控制器：负责接收 MoveIt 的路径，按 100Hz 拆分后发给电机
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

# arm_controller 的详细参数配置
arm_controller:
  ros__parameters:
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
    command_interfaces:
      - position
    state_interfaces:
      - position
    # 如果下发给电机的目标和电机真实位置偏差过大，就报错停机（保护真机安全）
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false